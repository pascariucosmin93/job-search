name: ci-cd

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  GIT_SHA: ${{ github.sha }}
  GITOPS_BASE_PATH: base

jobs:
  test-java:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [job-service, auth-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn -B test

  test-node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [notification-service, analytics-service, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install
      - name: Test ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: npm test

  build-and-push:
    needs: [test-java, test-node]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: job-service
          - service: auth-service
          - service: notification-service
          - service: analytics-service
          - service: frontend
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ env.GIT_SHA }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PUSH_TOKEN }}
          ref: ${{ secrets.GITOPS_REPO_BRANCH || 'main' }}
          path: gitops

      - name: Update image tags
        run: |
          for service in job-service auth-service notification-service analytics-service frontend; do
            manifest="gitops/${GITOPS_BASE_PATH}/${service}/deployment.yaml"
            image="${REGISTRY}/${IMAGE_NAMESPACE}/${service}:${GIT_SHA}"
            test -f "${manifest}"
            sed -i -E "s|(^[[:space:]]*image:[[:space:]]*).*$|\1${image}|" "${manifest}"
            grep -n "image:" "${manifest}"
          done

      - name: Commit and push GitOps changes
        working-directory: gitops
        run: |
          git config user.name "${{ secrets.GITOPS_PUSH_USER }}"
          git config user.email "${{ secrets.GITOPS_PUSH_USER }}@users.noreply.github.com"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "chore: update deployment images to ${GIT_SHA}"
          git push origin HEAD:${{ secrets.GITOPS_REPO_BRANCH || 'main' }}
