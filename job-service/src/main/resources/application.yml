server:
  port: 8080

spring:
  application:
    name: job-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:jobs}
    username: ${POSTGRES_USER:devops}
    password: ${POSTGRES_PASSWORD:gaz}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

jobs:
  api:
    base-url: ${JOBS_API_BASE_URL:https://www.arbeitnow.com}
    timeout-ms: ${JOBS_API_TIMEOUT_MS:5000}
